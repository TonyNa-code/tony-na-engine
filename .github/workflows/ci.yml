name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Python syntax check
        run: |
          python -m py_compile \
            run_editor.py \
            native_runtime/runtime_player.py \
            native_runtime/build_native_runtime_app.py \
            tools/release/check_editor_signing_readiness.py \
            tools/runtime/run_native_runtime_smoke.py \
            tests/test_run_editor_smoke.py \
            tests/test_native_runtime_render_smoke.py \
            tests/test_browser_playwright_smoke.py

      - name: Frontend syntax check
        run: |
          node --check prototype_editor/app.js
          node --check export_player_template/player.js

      - name: Backend smoke tests
        run: |
          python -m unittest discover -s tests -p 'test_run_editor_smoke.py' -v

      - name: Install native runtime smoke dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r native_runtime/requirements.txt

      - name: Native runtime render smoke tests
        env:
          SDL_AUDIODRIVER: dummy
          SDL_VIDEODRIVER: dummy
        run: |
          python -m unittest discover -s tests -p 'test_native_runtime_render_smoke.py' -v

      - name: Install browser smoke dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m playwright install --with-deps chromium

      - name: Browser Playwright smoke tests
        run: |
          python -m unittest discover -s tests -p 'test_browser_playwright_smoke.py' -v
